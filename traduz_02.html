async function traduzir(){
fecharCamera(); 
  const texto = inputText.value.trim();
  if(!texto){
    outputText.value = "";
    return;
  }

  outputText.value = "Traduzindo...";

  // ===== 1️⃣ TENTA API GRATUITA =====
  try{

    const r = await fetch("https://translate.googleapis.com/translate_a/single?client=gtx&sl="
      + fromLang.value + "&tl=" + toLang.value + "&dt=t&q=" + encodeURIComponent(texto));

    const data = await r.json();

    let traducao = "";
    data[0].forEach(t => traducao += t[0]);

    if(traducao){
      outputText.value = traducao;
      return;
    }

  }catch(e){
    console.log("Google fallback falhou");
  }

  // ===== 2️⃣ FALLBACK LIBRE =====
  try{

    const r = await fetch("https://libretranslate.de/translate",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        q: texto,
        source: fromLang.value,
        target: toLang.value,
        format: "text"
      })
    });

    const d = await r.json();

    if(d.translatedText){
      outputText.value = d.translatedText;
      return;
    }

  }catch(e){
    console.log("Libre falhou");
  }

  // ===== 3️⃣ FALLBACK OFFLINE (NUNCA QUEBRA) =====
  outputText.value =
    "⚠️ Sem conexão com tradução online.\n\n" + texto;
}

async function abrirCamera(){

  limparLens();

  cameraStream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: { ideal: "environment" } }
  });

  video.srcObject = cameraStream;
  video.style.display = "block";

  video.onclick = () => {

    const ctx = canvas.getContext("2d");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);

    fecharCamera(); // 🔥 fecha corretamente

    const img = document.getElementById("imgPreview");
    const lensArea = document.getElementById("lensArea");

    img.src = canvas.toDataURL("image/png");
    lensArea.style.display = "block";

    inputText.value = "";
    outputText.value = "";

    ativarSelecao();
  };
}

function processarScanner(canvas){

  let src = cv.imread(canvas);
  let gray = new cv.Mat();
  let blur = new cv.Mat();
  let edges = new cv.Mat();

  cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
  cv.GaussianBlur(gray, blur, new cv.Size(5,5), 0);
  cv.Canny(blur, edges, 75, 200);

  let contours = new cv.MatVector();
  let hierarchy = new cv.Mat();
  cv.findContours(edges, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

  let maior = null;
  let maxArea = 0;

  for(let i=0;i<contours.size();i++){
    let cnt = contours.get(i);
    let area = cv.contourArea(cnt);
    if(area > maxArea){
      maxArea = area;
      maior = cnt;
    }
  }

  if(maior){
    let rect = cv.boundingRect(maior);
    let recorte = src.roi(rect);
    cv.imshow(canvas, recorte);
    recorte.delete();
  }

  src.delete(); gray.delete(); blur.delete(); edges.delete();
  contours.delete(); hierarchy.delete();
}

function ativarSelecao(){

  const img = document.getElementById("imgPreview");
  const box = document.getElementById("selecao");

  let startX, startY, isSelecting = false;

  function getPos(e){
    const rect = img.getBoundingClientRect();

    if(e.touches){
      return {
        x: e.touches[0].clientX - rect.left,
        y: e.touches[0].clientY - rect.top
      };
    } else {
      return {
        x: e.clientX - rect.left,
        y: e.clientY - rect.top
      };
    }
  }

  function start(e){
    isSelecting = true;

    const pos = getPos(e);

    startX = pos.x;
    startY = pos.y;

    box.style.left = startX + "px";
    box.style.top = startY + "px";
    box.style.width = "0px";
    box.style.height = "0px";
    box.style.display = "block";
  }

  function move(e){
    if(!isSelecting) return;

    const pos = getPos(e);

    box.style.width = (pos.x - startX) + "px";
    box.style.height = (pos.y - startY) + "px";
  }

  function end(){
    if(!isSelecting) return;

    isSelecting = false;
    recortarETraduzir();
  }

  // mouse
  img.onmousedown = start;
  img.onmousemove = move;
  img.onmouseup = end;

  // 🔥 TOUCH (CELULAR)
  img.ontouchstart = start;
  img.ontouchmove = move;
  img.ontouchend = end;
}

async function recortarETraduzir(){

  const img = document.getElementById("imgPreview");
  const box = document.getElementById("selecao");

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  const imgRect = img.getBoundingClientRect();

  const x = parseInt(box.style.left);
  const y = parseInt(box.style.top);
  const w = parseInt(box.style.width);
  const h = parseInt(box.style.height);

  // escala real da imagem
  const scaleX = img.naturalWidth / imgRect.width;
  const scaleY = img.naturalHeight / imgRect.height;

  canvas.width = w * scaleX;
  canvas.height = h * scaleY;

  ctx.drawImage(
    img,
    x * scaleX,
    y * scaleY,
    w * scaleX,
    h * scaleY,
    0,
    0,
    canvas.width,
    canvas.height
  );

  const r = await Tesseract.recognize(canvas, "por");
  inputText.value = r.data.text;

  await traduzir();
}



async function traduzirTexto(txt, origem, destino){

  // 🔥 Google grátis
  try{
    const r = await fetch(
      "https://translate.googleapis.com/translate_a/single?client=gtx&sl="
      + origem + "&tl=" + destino + "&dt=t&q=" + encodeURIComponent(txt)
    );

    const data = await r.json();

    let traducao = "";
    data[0].forEach(t => traducao += t[0]);

    if(traducao) return traducao;

  }catch(e){
    console.log("Google falhou");
  }

  // 🔁 fallback Libre
  try{
    const r = await fetch("https://libretranslate.de/translate",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        q: txt,
        source: origem,
        target: destino,
        format: "text"
      })
    });

    const d = await r.json();
    if(d.translatedText) return d.translatedText;

  }catch(e){
    console.log("Libre falhou");
  }

  // 🧱 fallback final
  return "⚠️ Sem tradução: " + txt;
}

// ===== CONVERSA =====
let ouvindo=false;

function falarPessoa(p){

  const btn = (p==="A"?btnA:btnB);
  btn.classList.add("pulsando","btn-ativo");

  const origem = finalLista[p==="A"?langA.value:langB.value];
  const destino = finalLista[p==="A"?langB.value:langA.value];

  const rec = new (webkitSpeechRecognition || SpeechRecognition)();
  rec.lang = origem[0];
  rec.start();

  rec.onresult = async e => {

    const txt = e.results[0][0].transcript;

    addMsg(txt, p);

    const traducao = await traduzirTexto(txt, origem[0], destino[0]);

    addMsg(traducao, "traducao");

    const s = new SpeechSynthesisUtterance(traducao);
    s.lang = destino[0];
    speechSynthesis.speak(s);

    btn.classList.remove("pulsando","btn-ativo");
  };

  rec.onerror = () => {
    btn.classList.remove("pulsando","btn-ativo");
  };
}

// ===== MODO INTÉRPRETE AUTOMÁTICO =====
let modoInterprete = false;
let ultimaPessoa = "A";

async function iniciarInterprete(){
  modoInterprete = true;
  ouvirContinuo();
}

function pararInterprete(){
  modoInterprete = false;
}

async function ouvirContinuo(){

  if(!modoInterprete) return;

  const origem = finalLista[ultimaPessoa==="A"?langA.value:langB.value];
  const destino = finalLista[ultimaPessoa==="A"?langB.value:langA.value];

  const rec = new (webkitSpeechRecognition || SpeechRecognition)();
  rec.lang = origem[0];
  rec.interimResults = false;

  rec.start();

  rec.onresult = async (e)=>{

    const txt = e.results[0][0].transcript;

    addMsg(txt, ultimaPessoa);

    const traducao = await traduzirTexto(txt, origem[0], destino[0]);

    addMsg(traducao, "traducao");

    const s = new SpeechSynthesisUtterance(traducao);
    s.lang = destino[0];

    speechSynthesis.speak(s);

    s.onend = ()=>{
      ultimaPessoa = ultimaPessoa === "A" ? "B" : "A";
      ouvirContinuo();
    };
  };

  rec.onerror = ()=>{
    setTimeout(ouvirContinuo, 1000);
  };
}

async function TraduzirTudo(){

  const img = document.getElementById("imgPreview");

  if(!img.src){
    alert("Nenhuma imagem carregada");
    return;
  }

  // 🔥 cria canvas real da imagem
  const canvasTemp = document.createElement("canvas");
  const ctx = canvasTemp.getContext("2d");

  // 🔥 garante que a imagem carregou
  if(!img.complete){
    await new Promise(resolve => img.onload = resolve);
  }

  canvasTemp.width = img.naturalWidth;
  canvasTemp.height = img.naturalHeight;

  ctx.drawImage(img, 0, 0);

  inputText.value = "🔍 Lendo imagem...";

  try{

    let idiomaOCR = "eng";

if(fromLang.value === "pt") idiomaOCR = "por";
if(fromLang.value === "es") idiomaOCR = "spa";
if(fromLang.value === "fr") idiomaOCR = "fra";

const r = await Tesseract.recognize(canvasTemp, idiomaOCR, {
  logger: m => console.log(m)
})
.catch(() => Tesseract.recognize(canvasTemp, "eng"));

    const texto = r.data.text.trim();

    if(!texto){
      inputText.value = "⚠️ Nenhum texto encontrado";
      return;
    }

    inputText.value = texto;

    await traduzir();

  }catch(e){
    console.error(e);
    inputText.value = "❌ Erro ao processar imagem";
  }
}

function pararAudio(){

  // para a fala
  speechSynthesis.cancel();

  // 🔥 remove animação do botão ouvir
  btnOuvir.classList.remove("pulsando","btn-ativo");

  // esconde botão parar
  document.getElementById("btnPararAudio").style.display = "none";
}

function pausarAudio(){

  speechSynthesis.cancel();

  falando = false;

  // 🔥 garante que não pula frase
  if(indiceAtual > 0) indiceAtual--;

  btnPausar.style.display = "none";
  btnContinuar.style.display = "block";

  btnOuvir.classList.remove("pulsando");
}

function continuarAudio(){

  if(!falando){
    falarParte();
  }
}

function pararAudio(){

  speechSynthesis.cancel();

  falando = false;
  indiceAtual = 0;
  partesTexto = [];

  finalizarAudio();
}

function finalizarAudio(){

  btnOuvir.classList.remove("pulsando","btn-ativo");

  btnPararAudio.style.display = "none";
  btnPausar.style.display = "none";
  btnContinuar.style.display = "none";

  falando = false;
}


function falarDoPonto(){

  if(!textoFalando) return;

  const textoRestante = textoFalando.substring(posicaoAtual);

  falaAtual = new SpeechSynthesisUtterance(textoRestante);
  falaAtual.lang = toLang.value;
  falaAtual.rate = parseFloat(velocidadeAudio.value);

  btnOuvir.classList.add("pulsando","btn-ativo");

  speechSynthesis.speak(falaAtual);

  btnPararAudio.style.display = "block";
  btnPausar.style.display = "block";
  btnContinuar.style.display = "none";

  pausado = false;

  // 🔥 atualiza posição enquanto fala
  falaAtual.onboundary = (event)=>{
    if(event.name === "word"){
      posicaoAtual += event.charLength || 1;
    }
  };

  falaAtual.onend = finalizarAudio;
}

function pausarAudio(){

  if(speechSynthesis.speaking){

    speechSynthesis.cancel(); // 🔥 para de verdade

    pausado = true;

    btnPausar.style.display = "none";
    btnContinuar.style.display = "block";

    btnOuvir.classList.remove("pulsando");
  }
}

function continuarAudio(){

  // 🔥 garante reset do motor de voz
  speechSynthesis.cancel();

  // 🔥 força voltar a falar do ponto atual
  falarParte();
}

function pararAudio(){

  speechSynthesis.cancel();

  textoFalando = "";
  posicaoAtual = 0;

  finalizarAudio();
}

function dividirTexto(texto){
  return texto.match(/[^\.!\?\n]+[\.!\?\n]*/g) || [texto];
}

function falarParte(){

  speechSynthesis.cancel(); // 🔥 ESSENCIAL

  if(indiceAtual >= partesTexto.length){
    finalizarAudio();
    return;
  }

  falando = true;

  const parte = partesTexto[indiceAtual];

  falaAtual = new SpeechSynthesisUtterance(parte);
  falaAtual.lang = toLang.value;
  falaAtual.rate = parseFloat(velocidadeAudio.value);

  btnOuvir.classList.add("pulsando","btn-ativo");

  speechSynthesis.speak(falaAtual);

  btnPararAudio.style.display = "block";
  btnPausar.style.display = "block";
  btnContinuar.style.display = "none";

  falaAtual.onend = ()=>{
    if(falando){
      indiceAtual++;
      falarParte();
    }
  };
}

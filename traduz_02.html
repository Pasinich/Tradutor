// ===== ORDENAR =====
const ordenados = [...idiomas].sort((a,b)=>{
  const A = a[1].replace(/^[^\p{L}]+/u,"");
  const B = b[1].replace(/^[^\p{L}]+/u,"");
  return A.localeCompare(B,"pt-BR",{sensitivity:"base"});
});

// ===== FAVORITOS NO TOPO =====
const finalLista = [
  ...ordenados.filter(i=>favoritos.includes(i[0])),
  ...ordenados.filter(i=>!favoritos.includes(i[0]))
];

// ===== PREENCHER =====

  fromLang.innerHTML+=`<option value="${c}">${n}</option>`;
  toLang.innerHTML+=`<option value="${c}">${n}</option>`;
  langA.innerHTML+=`<option value="${i}">${n}</option>`;
  langB.innerHTML+=`<option value="${i}">${n}</option>`;
});

// ===== PADRÃO =====
fromLang.value="pt";
toLang.value="en";
langA.value = finalLista.findIndex(i=>i[0]==="pt");
langB.value = finalLista.findIndex(i=>i[0]==="en");


// ===== TRADUÇÃO VIA IA (HUGGING FACE) =====
async function traduzir(){

  const texto = inputText.value.trim();
  if(!texto) return;

  outputText.value = "Traduzindo...";

  // Mapeia idioma → modelo (exemplo PT → EN)
  const modelo = `Helsinki-NLP/opus-mt-${fromLang.value}-${toLang.value}`;

  try{
    const r = await fetch(
      `https://api-inference.huggingface.co/models/${modelo}`,
      {
        method:"POST",
        headers:{
          "Authorization": `Bearer ${HF_KEY}`,
          "Content-Type":"application/json"
        },
        body: JSON.stringify({
          inputs: texto
        })
      }
    );

    const data = await r.json();

    if(data[0]?.translation_text){
      outputText.value = data[0].translation_text;
    } else {
      outputText.value = "Modelo não disponível para esse idioma.";
    }

  }catch(e){
    console.error(e);
    outputText.value = "Erro na tradução.";
  }
}

// ===== MICROFONE =====
function falar(){
  limparEntrada();

  btnFalar.classList.add("pulsando","btn-ativo");

  const rec=new (webkitSpeechRecognition||SpeechRecognition)();
  rec.lang=fromLang.value;
  rec.start();

  rec.onresult=e=>{
    inputText.value=e.results[0][0].transcript;
  };

  rec.onend=()=>{
    btnFalar.classList.remove("pulsando","btn-ativo");
  };
}

// ===== VOZ =====
function ouvir(){
  btnOuvir.classList.add("pulsando","btn-ativo");

  const s=new SpeechSynthesisUtterance(outputText.value);
  s.lang=toLang.value;
  speechSynthesis.speak(s);

  s.onend=()=>{
    btnOuvir.classList.remove("pulsando","btn-ativo");
  };
}

// ===== CÂMERA + OCR + SCANNER =====
async function abrirCamera(){

  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: { ideal: "environment" } }
  });

  video.srcObject = stream;
  video.style.display = "block";

  video.onclick = async () => {

    // 1️⃣ captura imagem
    const ctx = canvas.getContext("2d");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);

    // 2️⃣ modo scanner (OpenCV) → recorte e limpeza
    processarScanner(canvas);

    // 3️⃣ para câmera
    stream.getTracks().forEach(t => t.stop());
    video.srcObject = null;
    video.style.display = "none";

    // 4️⃣ OCR no resultado já tratado
    const r = await Tesseract.recognize(canvas, "por");
    inputText.value = r.data.text;

    // 5️⃣ limpa canvas depois de usar
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 6️⃣ traduz
    await traduzir();
  };
}




function processarScanner(canvas){

  let src = cv.imread(canvas);
  let gray = new cv.Mat();
  let blur = new cv.Mat();
  let edges = new cv.Mat();

  cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
  cv.GaussianBlur(gray, blur, new cv.Size(5,5), 0);
  cv.Canny(blur, edges, 75, 200);

  let contours = new cv.MatVector();
  let hierarchy = new cv.Mat();
  cv.findContours(edges, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

  let maior = null;
  let maxArea = 0;

  for(let i=0;i<contours.size();i++){
    let cnt = contours.get(i);
    let area = cv.contourArea(cnt);
    if(area > maxArea){
      maxArea = area;
      maior = cnt;
    }
  }

  if(maior){
    let rect = cv.boundingRect(maior);
    let recorte = src.roi(rect);
    cv.imshow(canvas, recorte);
    recorte.delete();
  }

  src.delete(); gray.delete(); blur.delete(); edges.delete();
  contours.delete(); hierarchy.delete();
}




// ===== CONVERSA =====
let ouvindo=false;

function falarPessoa(p){
  if(ouvindo) return;
  ouvindo=true;

  const btn = (p==="A"?btnA:btnB);
  btn.classList.add("pulsando","btn-ativo");

  const origem = finalLista[p==="A"?langA.value:langB.value];
  const destino = finalLista[p==="A"?langB.value:langA.value];

  const rec=new (webkitSpeechRecognition||SpeechRecognition)();
  rec.lang=origem[0];
  rec.start();

  rec.onresult=async e=>{
    const txt=e.results[0][0].transcript;

    log.value+=`\n${p}: ${txt}`;

    const r=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(txt)}&langpair=${origem[0]}|${destino[0]}`);
    const d=await r.json();

    log.value+=`\n➡️ ${d.responseData.translatedText}\n`;

    const s=new SpeechSynthesisUtterance(d.responseData.translatedText);
    s.lang=destino[0];
    speechSynthesis.speak(s);

    btn.classList.remove("pulsando","btn-ativo");
    ouvindo=false;
  };

  rec.onerror=()=>{
    btn.classList.remove("pulsando","btn-ativo");
    ouvindo=false;
  };
}
